<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racoon 🦝</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="img/racoon-logo-transparent-lighttheme.png" alt="Racoon Logo" class="logo-img logo-light-theme">
                <img src="img/racoon-logo-transparent-darktheme.png" alt="Racoon Logo" class="logo-img logo-dark-theme">
                <h1>Racoon</h1>
            </div>
            <p>(réservez votre prochaine salle)</p>
            <button id="theme-toggle" aria-label="Changer le thème">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </header>
        <div class="main-content">
            <div class="left-panel">
                <main class="chat-container">
                    <div id="chat-box">
                        <div class="message gemini-message">Bonjour ! Je suis votre assistant de réservation. Que cherchez-vous ?</div>
                    </div>
                    <div id="loading-indicator" class="hidden">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </main>
                <footer>
                    <div class="input-area">
                        <input type="text" id="prompt-input" placeholder="Ex: une salle de danse pour 2 personnes demain..." autocomplete="off">
                        <button id="send-button" aria-label="Envoyer le message">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </footer>
            </div>
            <div class="right-panel">
                <!-- Ce panneau est maintenant entièrement contrôlé par script.js pour afficher les résultats dynamiques. -->
                <div class="slots-container">
                    <h3 class="slots-title">Bienvenue !</h3>
                    <div class="slots-grid"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/script.js?v=1.1"></script>
</body>
</html>
